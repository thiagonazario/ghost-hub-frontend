<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID ANALYTICS | Drop & Truth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base Branca e Profissional */
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Inter', sans-serif; }
        
        /* O Azul Elétrico do seu Logo */
        .void-blue { color: #00d4ff; }
        .void-bg-blue { background-color: #00d4ff; }
        
        /* Botão com Gradiente Suave para Destaque */
        .void-btn { 
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            transition: all 0.2s ease-in-out;
        }
        .void-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3); }

        /* Área de Drop Refinada */
        #drop-zone {
            border: 2px dashed #e5e7eb;
            background-color: #f9fafb;
        }
        #drop-zone:hover {
            border-color: #00d4ff;
            background-color: #f0fdff;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">
    <div class="max-w-3xl w-full text-center">
        
        <h1 class="text-6xl font-black mb-1 tracking-tighter italic">
            VOID <span class="void-blue">ANALYTICS</span>
        </h1>
        <p class="text-gray-500 mb-16 tracking-widest uppercase text-xs font-light">
            Drop your data. Get the truth. Leave no trace.
        </p>

        <div id="drop-zone" class="rounded-2xl p-16 mb-10 transition-all cursor-pointer">
            <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <p class="text-gray-600 font-medium">Drag & Drop CSV/XLSX</p>
            <p class="text-gray-400 text-sm mt-1">or click to browse your files</p>
            <input type="file" id="file-input" class="hidden" accept=".csv">
        </div>

        <div id="result" class="hidden bg-white p-8 rounded-2xl text-left border border-gray-100 shadow-sm">
            <div class="flex items-center mb-6">
                <div class="void-bg-blue h-2 w-2 rounded-full mr-3"></div>
                <h2 class="text-lg font-bold text-gray-900 uppercase tracking-tight">Insight Report</h2>
            </div>
            
            <div id="insight-text" class="text-sm leading-relaxed text-gray-700 whitespace-pre-wrap font-mono bg-gray-50 p-5 rounded-lg border border-gray-100">
                </div>
            
            <div class="flex justify-end mt-8">
                <button onclick="window.print()" class="void-btn px-8 py-3 rounded-xl font-bold text-white uppercase text-xs tracking-wider">
                    Download PDF
                </button>
            </div>
        </div>
        
        <p class="text-gray-400 text-xs mt-20">
            Hardened by Design. All data is processed in RAM and destroyed instantly.
        </p>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files;
            if (!file) return;

            // Feedback visual de carregamento
            dropZone.innerHTML = `
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-cyan-500 mx-auto mb-4"></div>
                <p class="text-cyan-600 font-medium">Processing in VOID...</p>
            `;
            
            const formData = new FormData();
            formData.append('file', file);

            try {
                // !!! TROQUE PELO SEU IP REAL !!!
                const response = await fetch('http://SEU_IP_DO_DROPLET:8000/analyze', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();
                
                // Formata o texto para exibição (remove aspas extras se houver)
                document.getElementById('insight-text').innerText = data.insight.trim();
                document.getElementById('result').classList.remove('hidden');
                dropZone.classList.add('hidden');
            
            } catch (error) {
                dropZone.innerHTML = `
                    <p class="text-red-600 font-medium">Error processing file.</p>
                    <p class="text-gray-400 text-sm mt-1">Please try again.</p>
                `;
                console.error('Error:', error);
            }
        };
    </script>
</body>
</html>
