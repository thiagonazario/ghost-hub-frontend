<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Architect | Strategic Briefing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #050505; color: #afafaf; font-family: 'JetBrains Mono', monospace; }
        .neon-border-purple { border: 1px solid rgba(168, 85, 247, 0.3); box-shadow: 0 0 15px rgba(168, 85, 247, 0.05); }
        .input-field { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .input-field:focus { border-color: #A855F7; outline: none; background: rgba(168, 85, 247, 0.05); }
        .grid-bg { background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 30px 30px; }
    </style>
    
    <script>
        (function() {
            const host = window.location.hostname;
            if (host === 'www.getghostarchitect.com' || host === 'getghostarchitect.com') {
                const script = document.createElement('script');
                script.defer = true;
                script.src = 'https://cloud.umami.is/script.js';
                script.setAttribute('data-website-id', 'fbf91d96-da57-4160-bbd5-803554b92392');
                document.head.appendChild(script);
            }
        })();
    </script>
</head>
<body class="grid-bg min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full bg-black neon-border-purple p-8 md:p-12 relative">
        <div class="absolute -top-3 -left-3 bg-purple-600 text-black text-[10px] font-black px-3 py-1 uppercase tracking-widest">
            Priority_Briefing_v1.2
        </div>

        <header class="mb-10">
            <h1 class="text-white text-2xl font-black uppercase tracking-tighter mb-2 italic">Surgical Intervention</h1>
            <p class="text-[10px] text-purple-400 uppercase tracking-[0.3em] font-bold">Domain 02 // Specialized Consulting</p>
        </header>

        <form action="https://formspree.io/f/MOURA_AQUI_SEU_ID" method="POST" class="space-y-6">
            <div>
                <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-2 font-bold">01. Operator_ID (Professional Email)</label>
                <input type="email" name="email" required placeholder="name@company.com" 
                    class="w-full input-field p-4 text-white text-sm">
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-2 font-bold">02. Infra_Scale (Monthly AWS Spend)</label>
                <select name="scale" class="w-full input-field p-4 text-white text-sm appearance-none">
                    <option value="stealth">Under $5k/mo</option>
                    <option value="mid_range">$5k - $50k/mo</option>
                    <option value="high_value">$50k - $250k/mo</option>
                    <option value="enterprise">Over $250k/mo</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-2 font-bold">03. Incident_Log (What's haunting your cloud?)</label>
                <textarea name="message" rows="4" placeholder="Describe architectural drift, cost leaks, or IAM security gaps..." 
                    class="w-full input-field p-4 text-white text-sm resize-none"></textarea>
            </div>

            <button type="submit" class="w-full bg-purple-600 hover:bg-white hover:text-black text-white font-black py-4 uppercase text-[11px] tracking-[0.4em] transition-all duration-500 shadow-lg shadow-purple-900/20">
                [ Submit_for_Triage ]
            </button>

            <footer class="mt-8 text-center">
                <a href="index.html" class="text-[9px] text-gray-700 hover:text-purple-400 uppercase tracking-widest transition">
                    << Abort_Mission_Return_to_Ghost_Hub
                </a>
            </footer>
        </form>
    </div>

</body>
</html>
